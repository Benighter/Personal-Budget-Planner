
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Budget Tracker Pro</title>
    <meta name="description" content="Personal budget allocation and tracking app" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Budget Tracker" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- Preconnect to Firebase to speed up first auth/data fetch -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://firebaseinstallations.googleapis.com" />
    <style>
      /* Safe area insets for devices with notch/status bar (Android edge-to-edge) */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
      }
      .main-content {
        padding-top: calc(5rem + var(--sat)) !important;
      }
      @media (min-width: 768px) {
        .main-content { padding-top: calc(6rem + var(--sat)) !important; }
      }
      @media (min-width: 1024px) {
        .main-content { padding-top: calc(7rem + var(--sat)) !important; }
      }
      .main-content-savings {
        padding-top: calc(5rem + var(--sat)) !important;
      }
      @media (min-width: 768px) {
        .main-content-savings { padding-top: calc(6rem + var(--sat)) !important; }
      }
      @media (min-width: 1024px) {
        .main-content-savings { padding-top: calc(7rem + var(--sat)) !important; }
      }
      /* Bottom safe area for home indicator bar */
      body {
        padding-bottom: var(--sab);
        background-color: #0f172a;
        /* Improve scroll performance on Android WebView */
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: none;
      }

      /* GPU-accelerated scroll container */
      .overflow-y-auto {
        -webkit-overflow-scrolling: touch;
        will-change: scroll-position;
        overscroll-behavior-y: contain;
      }

      /* Faster tap response: remove 300ms delay on Android */
      * { touch-action: manipulation; }

      /* Shared entrance animation used by Dashboard and other screens */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Prevent layout shifts during lazy-load transitions */
      main > * { min-height: 0; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'spin-slow': 'spin 8s linear infinite',
              'float': 'float 3s ease-in-out infinite',
              'gradient': 'gradient-shift 4s ease infinite',
              'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
              'shimmer': 'shimmer 3s infinite',
              'slide': 'slide 2s infinite',
              'glow': 'glow 2s ease-in-out infinite',
              'bounce-subtle': 'bounce-subtle 2s ease-in-out infinite'
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px) scale(1)', opacity: '0.7' },
                '25%': { transform: 'translateY(-3px) scale(1.1)', opacity: '1' },
                '50%': { transform: 'translateY(-1px) scale(0.9)', opacity: '0.8' },
                '75%': { transform: 'translateY(-2px) scale(1.05)', opacity: '0.9' }
              },
              'gradient-shift': {
                '0%, 100%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' }
              },
              'pulse-glow': {
                '0%, 100%': { 'box-shadow': '0 0 5px rgba(139, 92, 246, 0.3)' },
                '50%': { 'box-shadow': '0 0 20px rgba(139, 92, 246, 0.6), 0 0 30px rgba(139, 92, 246, 0.4)' }
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              },
              slide: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              },
              glow: {
                '0%, 100%': { opacity: '0.5', transform: 'scale(1)' },
                '50%': { opacity: '1', transform: 'scale(1.05)' }
              },
              'bounce-subtle': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-5px)' }
              }
            },
            backgroundSize: {
              '400%': '400% 400%'
            }
          }
        }
      }
    </script>
    <style>
      /* Enhanced Typography */
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom scrollbar for better aesthetics in dark mode */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 */
      }
      ::-webkit-scrollbar-thumb {
        background: #475569; /* slate-600 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* slate-500 */
      }

      /* Tabular numbers for financial data */
      .tabular-nums {
        font-variant-numeric: tabular-nums;
      }

      /* Custom animations for enhanced logo */
      @keyframes animate-spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px) scale(1);
          opacity: 0.7;
        }
        25% {
          transform: translateY(-3px) scale(1.1);
          opacity: 1;
        }
        50% {
          transform: translateY(-1px) scale(0.9);
          opacity: 0.8;
        }
        75% {
          transform: translateY(-2px) scale(1.05);
          opacity: 0.9;
        }
      }

      @keyframes gradient-shift {
        0%, 100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      @keyframes pulse-glow {
        0%, 100% {
          box-shadow: 0 0 5px rgba(139, 92, 246, 0.3);
        }
        50% {
          box-shadow: 0 0 20px rgba(139, 92, 246, 0.6), 0 0 30px rgba(139, 92, 246, 0.4);
        }
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @keyframes glow {
        0%, 100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
      }

      @keyframes bounce-subtle {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      .animate-spin-slow {
        animation: animate-spin-slow 8s linear infinite;
      }

      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      .animate-gradient {
        animation: gradient-shift 4s ease infinite;
        background-size: 400% 400%;
      }

      .animate-pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }

      .animate-shimmer {
        animation: shimmer 3s infinite;
      }

      .animate-slide {
        animation: slide 2s infinite;
      }

      .animate-glow {
        animation: glow 2s ease-in-out infinite;
      }

      .animate-bounce-subtle {
        animation: bounce-subtle 2s ease-in-out infinite;
      }

      /* Accessibility: Respect user preferences */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* High contrast mode support */
      @media (prefers-contrast: high) {
        .bg-slate-800 {
          background-color: #000;
        }
        .text-slate-400 {
          color: #fff;
        }
      }
    </style>
  </head>
  <body class="bg-slate-900 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
